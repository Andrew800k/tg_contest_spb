<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка доступа</title>
  <script type="module" src="config.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <style>
    /* Основной контейнер — центрируем всё */
    body {
      background-color: #ffffff !important;
      color: #000000 !important;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    /* Тёмная тема */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1e1e1e !important;
        color: #ffffff !important;
      }
    }

    /* Капча */
    #captcha-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    #captcha-instruction {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: bold;
      margin-bottom: 10px;
    }
    #captcha-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 15px;
      max-width: 280px;
      width: 100%;
    }
    .captcha-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: clamp(24px, 6vw, 36px);
      padding: 20px;
      aspect-ratio: 1;
      min-height: 80px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .captcha-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .captcha-btn.correct {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      animation: pulse 0.3s ease;
    }
    .captcha-btn.wrong {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      animation: shake 0.3s ease;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    #captcha-progress {
      font-size: clamp(14px, 3vw, 18px);
      color: inherit;
      opacity: 0.8;
    }
    #captcha-sequence {
      font-size: clamp(18px, 5vw, 28px);
      margin: 10px 0;
      padding: 10px;
      background: rgba(0,0,0,0.05);
      border-radius: 12px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (prefers-color-scheme: dark) {
      #captcha-sequence {
        background: rgba(255,255,255,0.05);
      }
    }

    /* Анимация свечения для капчи */
    @keyframes glow-success {
      0% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
      50% { box-shadow: 0 0 40px 20px rgba(46, 213, 115, 0.6); }
      100% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
    }
    @keyframes glow-error {
      0% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0); }
      50% { box-shadow: 0 0 40px 20px rgba(235, 77, 75, 0.6); }
      100% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0); }
    }
    .captcha-glow-success {
      animation: glow-success 1s ease-out;
    }
    .captcha-glow-error {
      animation: glow-error 1s ease-out;
    }

    /* Контейнер для анимации */
    #animation-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      width: 100%;
    }
    #animation-container {
      width: 55vw;
      max-width: 400px;
      min-width: 220px;
      display: none;
    }
    /* Контейнер для результата */
    .result-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80%;
      max-width: 500px;
      height: 20vh;
    }
    /* Адаптивный текст результата */
    #status {
      font-size: clamp(18px, 4vw, 28px);
      color: inherit !important;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      width: 100%;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body>

  <!-- Контейнер для капчи -->
  <div id="captcha-container" style="display: none;">
    <div id="captcha-instruction">Нажмите кнопки по порядку:</div>
    <div id="captcha-sequence"></div>
    <div id="captcha-buttons"></div>
    <div id="captcha-progress"></div>
  </div>

  <!-- Контейнер для анимации -->
  <div id="animation-wrapper">
    <div id="animation-container"></div>
  </div>

  <!-- Контейнер для результата -->
  <div class="result-container">
    <div id="status"></div>
  </div>

  <script type="module">
    import CONFIG from './config.js';

    document.addEventListener("DOMContentLoaded", () => {
      if (window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) {

        Telegram.WebApp.ready();
        const initDataUnsafe = Telegram.WebApp.initDataUnsafe;
        const telegramId = initDataUnsafe.user.id;

        const urlParams = new URLSearchParams(window.location.search);
        const startAppParam = urlParams.get("startapp") ||
                              urlParams.get("startApp") ||
                              initDataUnsafe.start_param ||
                              null;

        if (urlParams.get("web_app_request_write_access") === "1") {
          Telegram.WebApp.requestWriteAccess();
        }

        const animationContainer = document.getElementById("animation-container");
        const anim = lottie.loadAnimation({
          container: animationContainer,
          renderer: "svg",
          loop: true,
          autoplay: false,
          path: "cat.json"
        });

        // Функция капчи - нажать кнопки в правильном порядке
        function showCaptcha(onSuccess) {
          const captchaContainer = document.getElementById("captcha-container");
          const sequenceEl = document.getElementById("captcha-sequence");
          const buttonsEl = document.getElementById("captcha-buttons");
          const progressEl = document.getElementById("captcha-progress");

          // Генерируем случайную последовательность из эмодзи
          const emojis = ["🎯", "🎪", "🎨", "🎭", "🎬", "🎮"];
          const shuffled = emojis.sort(() => Math.random() - 0.5);
          const sequence = shuffled.slice(0, 4); // 4 кнопки
          const buttons = [...sequence].sort(() => Math.random() - 0.5); // Перемешиваем для показа
          
          let currentStep = 0;
          let attempts = 3;

          // Показываем последовательность
          sequenceEl.innerHTML = sequence.map((e, i) => 
            `<span style="font-size: 28px; margin: 0 5px;">${i < currentStep ? '✅' : e}</span>`
          ).join('');
          
          // Создаем кнопки
          buttonsEl.innerHTML = '';
          buttons.forEach(emoji => {
            const btn = document.createElement('button');
            btn.className = 'captcha-btn';
            btn.textContent = emoji;
            btn.onclick = () => handleClick(emoji, btn);
            buttonsEl.appendChild(btn);
          });

          progressEl.textContent = `Осталось попыток: ${attempts}`;
          captchaContainer.style.display = "flex";

          function handleClick(emoji, btnElement) {
            if (emoji === sequence[currentStep]) {
              // Правильно!
              btnElement.classList.add('correct');
              Telegram.WebApp.HapticFeedback.impactOccurred("light");
              currentStep++;
              
              sequenceEl.innerHTML = sequence.map((e, i) => 
                `<span style="font-size: 28px; margin: 0 5px;">${i < currentStep ? '✅' : e}</span>`
              ).join('');

              if (currentStep === sequence.length) {
                // Капча пройдена!
                Telegram.WebApp.HapticFeedback.notificationOccurred("success");
                // Зелёное свечение вместо конфетти
                captchaContainer.classList.add('captcha-glow-success');
                progressEl.textContent = "✅ Проверка пройдена!";
                setTimeout(() => onSuccess(), 1000);
              }
            } else {
              // Неправильно!
              btnElement.classList.add('wrong');
              Telegram.WebApp.HapticFeedback.notificationOccurred("error");
              attempts--;
              
              // Красное свечение при ошибке
              captchaContainer.classList.add('captcha-glow-error');
              setTimeout(() => {
                btnElement.classList.remove('wrong');
                captchaContainer.classList.remove('captcha-glow-error');
              }, 300);

              if (attempts <= 0) {
                // Попытки закончились - сброс
                progressEl.textContent = "❌ Попробуйте еще раз...";
                setTimeout(() => {
                  currentStep = 0;
                  attempts = 3;
                  showCaptcha(onSuccess);
                }, 1500);
              } else {
                progressEl.textContent = `Осталось попыток: ${attempts}`;
              }
            }
          }
        }

        // СНАЧАЛА показываем капчу, ПОТОМ анимацию + проверку
        showCaptcha(() => {
          // После успешного прохождения капчи
          document.getElementById("captcha-container").style.display = "none";
          animationContainer.style.display = "block";
          anim.play();
          checkAccess(startAppParam);
        });

        async function checkAccess(startAppParam) {
          const statusEl = document.getElementById("status");
          if (!telegramId) {
            statusEl.innerText = "Ошибка: Telegram ID не получен!";
            statusEl.style.opacity = "1";
            return;
          }

          const user = Telegram.WebApp.initDataUnsafe.user;
          const payload = {
            telegramId,
            startAppParam,
            username: user.username || null,
            firstName: user.first_name || null,
            lastName: user.last_name || null,
            initData: Telegram.WebApp.initData  // ← Добавляем подписанные данные для проверки
          };

          const msgs = [
            "🔍 Сверяем данные…",
            "🤔 Считаем участников…",
            "🔄 Проверяем подписки…",
            "⏳ Ещё одна попытка…",
            "🚀 Завершаем проверку…"
          ];

          let attempt = 0, success = false, backoff = 500, data;
          while (attempt < 5 && !success) {
            statusEl.innerHTML = msgs[attempt];
            statusEl.style.opacity = "1";
            try {
              const res = await fetch(CONFIG.END_POINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });
              if (!res.ok) throw new Error(`Статус ${res.status}`);
              data = await res.json();
              success = true;
            } catch (e) {
              attempt++;
              if (attempt < 5) {
                await new Promise(r => setTimeout(r, backoff + Math.random()*200));
                backoff *= 2;
              } else {
                statusEl.innerHTML = "⏳ Ошибка запроса. Повторите позже.";
                return;
              }
            }
          }

          // Останавливаем анимацию
          anim.stop();
          animationContainer.style.display = "none";

          if (data.status === "finished") {
            statusEl.innerHTML = "Конкурс завершён 🔚";
          } else if (data.status === "allowed") {
            statusEl.innerHTML = "✅ Условия подписки выполнены";
            Telegram.WebApp.HapticFeedback.impactOccurred("medium");
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
          } else {
            statusEl.innerHTML = "❌ Условия подписки не выполнены";
            Telegram.WebApp.HapticFeedback.notificationOccurred("error");
            confetti({
              particleCount: 80,
              spread: 60,
              startVelocity: -40,
              gravity: 1.2,
              origin: { y: -0.2 },
              colors: ['#ff0000', '#ff4444', '#cc0000']
            });
            statusEl.style.animation = "shake 0.3s ease-in-out 2";
          }
        }
      } else {
        document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:white;">
            <h1>Участие возможно только через официальные приложения Телеграм</h1>
          </div>`;
      }
    });
  </script>

</body>
</html>
